name: Create Portfolio GIF Daily

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

concurrency:
  group: portfolio-gif
  cancel-in-progress: true

jobs:
  create-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create GIF
        env:
          WALLET: ${{ secrets.WALLET }}
          FUNDS: ${{ secrets.FUNDS }}
        run: |
          mkdir -p assets
          python scripts/create_gif.py

      - name: Upload GIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance_animation
          path: assets/performance_animation.gif
          if-no-files-found: error

      - name: Commit and push GIF
        env:
          # Use the automatically provided token (no need to store as a secret)
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add assets/performance_animation.gif

          if git diff --cached --quiet; then
            echo "No changes detected, skipping push."
            exit 0
          fi

          git commit -m "chore: update portfolio performance GIF [auto]"

          # Push back to the same branch that triggered the workflow
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"